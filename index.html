<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Lifecycle</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }
    .map-wrapper {
      width: 100%;
      max-width: 2000px;
      margin: 0 auto;
    }
    .map-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="map-wrapper">
    <img src="order_lifecycle.png" usemap="#image-map" alt="Order Lifecycle">
    <map name="image-map">
      <area target="_blank" alt="Online Orders from BigCommerce" title="Online Orders from BigCommerce" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/sales-operations/customer-service-sales/order-management-customer-service/big-commerce-orders-order-management" coords="1889,228,1466,83" shape="rect">
      <area target="_blank" alt="Process Order" title="Process Order" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/sales-operations/customer-service-sales/order-management-customer-service/processing-orders-in-stoneedge-order-management" coords="784,438,1449,595" shape="rect">
      <area target="_blank" alt="Supplier Purchase Orders" title="Supplier Purchase Orders" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/warehouse-operations/purchasing-warehouse" coords="113,784,541,941" shape="rect">
      <area target="_blank" alt="Receiving Inventory" title="Receiving Inventory" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/warehouse-operations/receiving-inventory-warehouse" coords="786,782,1207,940" shape="rect">
      <area target="_blank" alt="Pick &amp; Pack" title="Pick &amp; Pack" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/warehouse-operations/pickerpacker" coords="1461,782,1890,940" shape="rect">
      <area target="_blank" alt="Manual Orders" title="Manual Orders" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/sales-operations/customer-service-sales/payment-processing-customer-service/manual-orders-payment-processing" coords="777,72,1219,229" shape="rect">
      <area target="_blank" alt="Creating Quotes" title="Creating Quotes" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/sales-operations/customer-service-sales/quotes-price-estimates-customer-service" coords="111,74,542,230" shape="rect">
      <area target="_blank" alt="Ship Orders" title="Ship Orders" href="https://sites.google.com/flags.com/flagsdotcom-portal/operations/warehouse-operations/shipping-warehouse" coords="1458,1017,1883,1141" shape="rect">
    </map>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/image-map-resizer@1.0.10/js/imageMapResizer.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      imageMapResize();
    });
  </script>
</body>
</html>
